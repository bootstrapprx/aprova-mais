services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "82:82"
    networks:
      - default
      - kodvs-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app: { condition: service_started }
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    expose: ["5432"]
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth:
    image: supabase/gotrue:v2.160.0
    expose: ["9999"]
    depends_on:
      db: { condition: service_healthy }
    environment:
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: https://aprova.kodoo.online
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_LOG_LEVEL: ${GOTRUE_LOG_LEVEL:-warn}
      API_EXTERNAL_URL: https://aprova.kodoo.online
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_SUPABASE_URL: https://aprova.kodoo.online
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: https://aprova.kodoo.online
    expose: ["3000"]
    depends_on:
      db: { condition: service_healthy }
      auth: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/aprova_mais
      SUPABASE_URL: http://auth:9999
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SUPABASE_URL: https://aprova.kodoo.online
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      NEXT_PUBLIC_APP_URL: https://aprova.kodoo.online
      SUPABASE_ADMIN_IDS: ${SUPABASE_ADMIN_IDS:-""}
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped

networks:
  kodvs-network:
    external: true

volumes:
  pgdata:

services:
  db:
    image: postgres:16-alpine
    ports: ["5433:5432"]
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    image: supabase/gotrue:v2.160.0
    ports: ["9999:9999"]
    depends_on:
      db: { condition: service_healthy }
    environment:
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: jwt-secret-para-aprova-mais-32caracteres
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_LOG_LEVEL: debug
      API_EXTERNAL_URL: http://localhost:9999

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports: ["3000:3000"]
    depends_on:
      db: { condition: service_healthy }
      auth: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aprova_mais
      SUPABASE_URL: http://auth:9999
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:9999
      SUPABASE_JWT_SECRET: jwt-secret-para-aprova-mais-32caracteres
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
